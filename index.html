<!DOCTYPE html>
<html lang="ne">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>पर्दाफास — Parda Faas | Nepal's Civic Investigation Game</title>
    <meta name="description" content="पर्दाफास (Parda Faas) — Nepal's first competitive civic investigation platformer. Expose corruption, collect evidence, and publish your exposé!" />
    <meta name="keywords" content="Parda Faas, Nepal game, civic game, anti-corruption, platformer, browser game" />
    <meta property="og:title" content="पर्दाफास — Parda Faas" />
    <meta property="og:description" content="Nepal's first competitive civic investigation platformer game." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Mukta:wght@400;600;700&family=Bangers&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #1A1A2E;
        overflow: hidden;
        font-family: 'Mukta', sans-serif;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #loading-screen {
        position: fixed; inset: 0;
        background: #1A1A2E;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s ease;
      }
      #loading-screen.fade-out { opacity: 0; pointer-events: none; }
      #loading-logo {
        font-family: 'Teko', sans-serif;
        font-size: clamp(48px, 8vw, 96px);
        color: #FF6B00;
        text-shadow: 0 0 40px rgba(255,107,0,0.6), 4px 4px 0 #C0392B;
        letter-spacing: 4px;
        animation: pulse-logo 2s ease-in-out infinite;
      }
      #loading-nepali {
        font-family: 'Mukta', sans-serif;
        font-size: clamp(20px, 3vw, 32px);
        color: #F1C40F;
        margin-top: 8px;
        letter-spacing: 6px;
      }
      #loading-bar-wrap {
        width: 300px; height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 3px; margin-top: 40px; overflow: hidden;
      }
      #loading-bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #FF6B00, #F1C40F);
        border-radius: 3px;
        transition: width 0.3s ease;
      }
      #loading-tip {
        color: rgba(255,255,255,0.5);
        font-size: 14px; margin-top: 16px;
        font-family: 'Mukta', sans-serif;
      }
      @keyframes pulse-logo {
        0%, 100% { text-shadow: 0 0 40px rgba(255,107,0,0.6), 4px 4px 0 #C0392B; }
        50% { text-shadow: 0 0 80px rgba(255,107,0,0.9), 4px 4px 0 #C0392B; }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div id="loading-logo">PARDA FAAS</div>
      <div id="loading-nepali">पर्दाफास</div>
      <div id="loading-bar-wrap">
        <div id="loading-bar"></div>
      </div>
      <div id="loading-tip">Loading investigation files...</div>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
